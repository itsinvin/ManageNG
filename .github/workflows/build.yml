name: Build

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev libayatana-appindicator3-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci
      - run: python3 -m pip install Pillow
      - run: python3 scripts/generate-installer-assets.py
      - run: npm run build
      - run: cd src-tauri && cargo test
      - run: npm run tauri build -- --bundles deb
        env:
          CI: true
